<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big 2 — Lobby</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lobby">
    <h1>Big 2 <span class="suit s">♠</span></h1>

    <div class="card-box">
      <h2>Create Room</h2>
      <input id="create-name" type="text" placeholder="Your name" maxlength="16" />
      <button id="create-btn">Create Room</button>
    </div>

    <div class="divider">— or —</div>

    <div class="card-box">
      <h2>Join Room</h2>
      <input id="join-name" type="text" placeholder="Your name" maxlength="16" />
      <input id="join-code" type="text" placeholder="Room code (e.g. AB12)" maxlength="4" style="text-transform:uppercase" />
      <button id="join-btn">Join Room</button>
    </div>

    <div id="lobby-error" class="error hidden"></div>
  </div>

  <script>
    const WS_URL = location.host
      ? (location.protocol === 'https:' ? `wss://${location.host}` : `ws://${location.host}`)
      : 'ws://localhost:3001';

    function go(message) {
      const ws = new WebSocket(WS_URL);
      ws.onopen = () => ws.send(JSON.stringify(message));
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'room_joined') {
          sessionStorage.setItem('big2_ws_state', JSON.stringify({
            playerId: data.playerId,
            roomCode: data.roomCode,
            isHost: data.isHost,
            players: data.players,
          }));
          ws.close();
          window.location.href = 'game.html';
        } else if (data.type === 'error') {
          showError(data.message);
          ws.close();
        }
      };
      ws.onerror = () => showError('Cannot connect to server');
    }

    function showError(msg) {
      const el = document.getElementById('lobby-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    document.getElementById('create-btn').onclick = () => {
      const name = document.getElementById('create-name').value.trim();
      if (!name) return showError('Enter your name');
      go({ type: 'create_room', playerName: name });
    };

    document.getElementById('join-btn').onclick = () => {
      const name = document.getElementById('join-name').value.trim();
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      if (!name) return showError('Enter your name');
      if (!code) return showError('Enter a room code');
      go({ type: 'join_room', playerName: name, roomCode: code });
    };
  </script>
</body>
</html>
